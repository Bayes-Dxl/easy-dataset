<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 1024px; height: 1024px; overflow: hidden; background: transparent; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1c2e46"/>
      <stop offset="100%" stop-color="#0c1825"/>
    </linearGradient>
    <linearGradient id="bracketGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2aa0f0"/>
      <stop offset="100%" stop-color="#0060b8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="196" fill="url(#bg)"/>

  <!-- Very subtle top-light sheen -->
  <ellipse cx="512" cy="120" rx="380" ry="90" fill="rgba(255,255,255,0.03)"/>

  <!-- ── CORNER BRACKETS ── -->
  <!-- arm length 200px, stroke 58px, corner at 148,148 / 876,148 / 148,876 / 876,876 -->

  <!-- Top-left -->
  <path d="M 148 352 L 148 148 L 352 148"
        fill="none" stroke="url(#bracketGrad)" stroke-width="58"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Top-right -->
  <path d="M 876 352 L 876 148 L 672 148"
        fill="none" stroke="url(#bracketGrad)" stroke-width="58"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Bottom-left -->
  <path d="M 148 672 L 148 876 L 352 876"
        fill="none" stroke="url(#bracketGrad)" stroke-width="58"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Bottom-right -->
  <path d="M 876 672 L 876 876 L 672 876"
        fill="none" stroke="url(#bracketGrad)" stroke-width="58"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- ── CENTER: detection target + dataset rows ── -->

  <!-- Outer ring -->
  <circle cx="512" cy="490" r="108" fill="none" stroke="#0e8fe0" stroke-width="16" opacity="0.18"/>
  <!-- Inner ring -->
  <circle cx="512" cy="490" r="64"  fill="none" stroke="#0e8fe0" stroke-width="20" opacity="0.32"/>
  <!-- Center dot -->
  <circle cx="512" cy="490" r="28"  fill="#1a9aee" opacity="0.95"/>
  <!-- Cross hairs -->
  <line x1="512" y1="366" x2="512" y2="402" stroke="#0e8fe0" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
  <line x1="512" y1="578" x2="512" y2="614" stroke="#0e8fe0" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
  <line x1="386" y1="490" x2="422" y2="490" stroke="#0e8fe0" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
  <line x1="602" y1="490" x2="638" y2="490" stroke="#0e8fe0" stroke-width="14" stroke-linecap="round" opacity="0.5"/>

  <!-- ── DATA ROWS below target (dataset label rows) ── -->
  <!-- Row 1 -->
  <rect x="348" y="630" width="24" height="24" rx="6" fill="#1a9aee" opacity="0.9"/>
  <rect x="388" y="633" width="192" height="18" rx="9" fill="#0e8fe0" opacity="0.45"/>

  <!-- Row 2 -->
  <rect x="348" y="672" width="24" height="24" rx="6" fill="#1a9aee" opacity="0.6"/>
  <rect x="388" y="675" width="148" height="18" rx="9" fill="#0e8fe0" opacity="0.28"/>

  <!-- Row 3 -->
  <rect x="348" y="714" width="24" height="24" rx="6" fill="#1a9aee" opacity="0.38"/>
  <rect x="388" y="717" width="172" height="18" rx="9" fill="#0e8fe0" opacity="0.18"/>

  <!-- Confidence badge attached to top-left bracket -->
  <rect x="148" y="84" width="164" height="54" rx="14" fill="#0078d4"/>
  <text x="230" y="120" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="30" font-weight="700" fill="white" text-anchor="middle" letter-spacing="0.5">99.2%</text>
</svg>
</body>
</html>
